<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Mizuka - Вход</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}" />
  <link rel="stylesheet" th:href="@{/css/buttons/back-to-home.css}" />
</head>
<body>
<div class="container">
  <div class="auth-card">
    <header class="auth-header">
      <h1>Sign in</h1>
      <p>Login to your account</p>
    </header>

    <!-- Ошибка входа -->
    <div th:if="${param.error}" class="error-alert">
      <span>
        Incorrect entered data.
      </span>
    </div>

    <!-- Форма входа -->
    <form th:action="@{/auth/login}" th:object="${loginForm}" method="post" class="auth-form">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" th:field="*{username}" required />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" th:field="*{password}" required />
      </div>

      <button type="submit" class="btn btn-primary">Sign in</button>
    </form>

    <div class="auth-footer">
      <hr class="separator" />
      <a th:href="@{/auth/register}" class="auth-link">Sign up</a>
    </div>
  </div>

  <div sec:authorize="isAuthenticated()" class="home-button-wrapper">
    <a href="/" class="back-to-home">
      Home
    </a>
  </div>
</div>
</body>
</html>
