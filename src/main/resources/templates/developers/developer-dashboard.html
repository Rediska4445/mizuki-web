<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>Developer Portal</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body class="container mt-5">

<h2>Developer Applications</h2>
<p class="text-muted">Manage your API credentials here.</p>

<div th:if="${newAppSecret}" class="alert alert-warning">
    <h4>App Created Successfully!</h4>
    <p>Please copy your credentials now. You won't see the secret again.</p>
    <div><strong>Client ID:</strong> <code th:text="${newAppClientId}"></code></div>
    <div><strong>Client Secret:</strong> <code th:text="${newAppSecret}"></code></div>
</div>

<table class="table table-striped mt-4">
    <thead>
    <tr>
        <th>App Name</th>
        <th>Client ID</th>
        <th>Scopes</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="app : ${apps}">
        <td th:text="${app.developerName}"></td>
        <td><code th:text="${app.clientId}"></code></td>
        <td>
            <span class="text-muted">••••••••••••••••</span>
            <form th:action="@{/developers/developer-dashboard/regenerate}" method="post" style="display:inline;">
                <input type="hidden" name="appId" th:value="${app.id}">
                <button type="submit" class="btn btn-sm btn-outline-danger ms-2"
                        onclick="return confirm('Are you sure? Old secret will stop working!')">
                    Regenerate Secret
                </button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<div class="card mt-5">
    <div class="card-body">
        <h5 class="card-title">Register New Application</h5>
        <form th:action="@{/developers/developer-dashboard/create}" method="post">
            <input type="text" name="appName" class="form-control" placeholder="Имя приложения" required>
            <button type="submit" class="btn btn-success">Создать</button>
        </form>
    </div>
</div>

<div class="mt-3">
    <a th:href="@{/}" class="btn btn-outline-secondary">Back to Home</a>
</div>

</body>
</html>
