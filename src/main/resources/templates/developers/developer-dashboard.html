<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>Developer Portal</title>
    <link rel="stylesheet" href="/css/developer-portal.css">
    <link rel="stylesheet" th:href="@{/css/buttons/back-to-home.css}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="container">
    <header class="page-header">
        <h1>Developer Applications</h1>
        <p class="subtitle">Manage your API credentials here.</p>
    </header>

    <div th:if="${newAppSecret}" class="success-alert">
        <h3>App Created Successfully!</h3>
        <p>Please copy your credentials now. You won't see the secret again.</p>
        <div class="credentials">
            <div><strong>Client ID:</strong> <code th:text="${newAppClientId}"></code></div>
            <div><strong>Client Secret:</strong> <code th:text="${newAppSecret}"></code></div>
        </div>
    </div>

    <div class="table-container">
        <table class="apps-table">
            <thead>
            <tr>
                <th>App Name</th>
                <th>Client ID</th>
                <th>Secret ID</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="app : ${apps}">
                <td th:text="${app.developerName}"></td>
                <td><code th:text="${app.clientId}"></code></td>
                <td>
                    <form th:action="@{/developers/developer-dashboard/regenerate}" method="post" class="inline-form">
                        <input type="hidden" name="appId" th:value="${app.id}">
                        <button type="submit" class="btn btn-regenerate"
                                onclick="return confirm('Are you sure? Old secret will stop working!')">
                            Regenerate
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="new-app-card">
        <div class="card-header">
            <h2>Register New Application</h2>
        </div>
        <form th:action="@{/developers/developer-dashboard/create}" method="post" class="new-app-form">
            <div class="form-group">
                <input type="text" name="appName" placeholder="Application name" required>
            </div>
            <button type="submit" class="btn btn-primary">Create</button>
        </form>
    </div>

    <a href="/" class="back-to-home">
        <svg class="home-icon" viewBox="0 0 24 24">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        Home
    </a>
</div>
</body>
</html>
